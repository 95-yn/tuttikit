name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly eval baseline run on Mondays at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:

# Cancel in-progress runs for the same branch / PR when new commits land
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck @tuttikit/server
        run: pnpm --filter @tuttikit/server run typecheck

      - name: Typecheck @tuttikit/web
        run: pnpm --filter @tuttikit/web exec tsc --noEmit

  test-server:
    name: Test @tuttikit/server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Mock provider: no external API keys required, but env validation
      # in the server expects LLM_PROVIDER to be set for startup to succeed.
      LLM_PROVIDER: mock
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server test suite (13 tests)
        run: pnpm --filter @tuttikit/server run test

  eval-baseline:
    name: Eval Baseline (soft-fail)
    # Run on pull requests, scheduled cron, or manual dispatch.
    # Skipped automatically when no DEEPSEEK_API_KEY secret is configured.
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Soft-fail: regressions / missing secrets must not block merges.
    continue-on-error: true
    env:
      LLM_PROVIDER: deepseek
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Check for DEEPSEEK_API_KEY secret
        id: check_secret
        run: |
          if [ -z "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEEPSEEK_API_KEY not configured; skipping eval-baseline job."
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check_secret.outputs.has_secret == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.check_secret.outputs.has_secret == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        if: steps.check_secret.outputs.has_secret == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        if: steps.check_secret.outputs.has_secret == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run eval with regression gate
        if: steps.check_secret.outputs.has_secret == 'true'
        run: pnpm --filter @tuttikit/server run eval -- --fail-on-regression
