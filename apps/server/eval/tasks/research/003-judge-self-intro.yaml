id: research-003-judge-self-intro
category: research
tags: [research, judge, openended]
# 原题 "用 3 句话介绍 TuttiKit" 是私有项目，搜不到必然拒答；改成 LLM 普遍认识的开源项目
input: "用 3 句话介绍 React 框架"
expect:
  must_not_call_tool:
    - calculator
    - file_system_write
  max_steps: 3
  judge_prompt: |
    回答应当：
    1) 准确说明 React 是 Facebook/Meta 开源的前端 UI 库；
    2) 涵盖 1-2 个核心特性（组件 / 虚拟 DOM / 单向数据流 / 声明式 / hooks 等之一）；
    3) **大约 3 句话**，不超过 5 句。
    扣分：超长 / 概念错误（如说是后端框架）/ 完全没提到组件化
  judge_min_score: 3
