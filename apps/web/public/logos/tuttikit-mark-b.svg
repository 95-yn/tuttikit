<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>TuttiKit Mark B · Hub Topology</title>
  <!-- 中心 Conductor：实心方圆，强调主导 -->
  <rect x="25" y="25" width="14" height="14" rx="3" fill="currentColor"/>
  <!-- 3 个 sub-agent 节点：空心圆，三角排列 -->
  <circle cx="32" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="2.6"/>
  <circle cx="11" cy="48" r="6" fill="none" stroke="currentColor" stroke-width="2.6"/>
  <circle cx="53" cy="48" r="6" fill="none" stroke="currentColor" stroke-width="2.6"/>
  <!-- 连接线：从中心方块出发到三个节点 -->
  <line x1="32" y1="25" x2="32" y2="16" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="26.5" y1="38" x2="16" y2="46" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="37.5" y1="38" x2="48" y2="46" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
</svg>
