<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>TuttiKit Mark C · Tutti</title>
  <!-- 意大利语 "Tutti"=合奏；5 根高低不同的竖条对应"齐奏"的多 agent，
       中央高、两侧渐低，像音叉/均衡器/管弦谱面 -->
  <rect x="8"  y="22" width="6" height="26" rx="1.2" fill="currentColor"/>
  <rect x="18" y="16" width="6" height="32" rx="1.2" fill="currentColor"/>
  <rect x="28" y="10" width="6" height="38" rx="1.2" fill="currentColor"/>
  <rect x="38" y="16" width="6" height="32" rx="1.2" fill="currentColor"/>
  <rect x="48" y="22" width="6" height="26" rx="1.2" fill="currentColor"/>
  <!-- 底部地基线：所有声部"对齐"演奏的视觉锚点 -->
  <line x1="6" y1="54" x2="58" y2="54" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
</svg>
