services:
  tuttikit-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: tuttikit-server:latest
    container_name: tuttikit-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # 容器内默认监听 0.0.0.0
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
    volumes:
      # 持久化：sessions / traces / uploads / long-term memory / eval-runs 都在这里
      - ./data:/app/apps/server/data
      # 只读挂载 Skills（如果用户在宿主机有 ~/.claude/skills/）
      - ${HOME}/.claude/skills:/home/node/.claude/skills:ro
      # 项目级 .mcp.json
      - ./.mcp.json:/app/.mcp.json:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # graceful shutdown：drain.ts 默认 30s 超时；给容器 35s 等它跑完
    stop_grace_period: 35s
